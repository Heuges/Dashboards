name: Deploy to dashboard-assistant.digify.ai

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd ~/work/Dashboards
            echo "Pulling latest code..."
            git pull origin main
            echo "Installing dependencies..."
            cd my-assistant && npm install --production && cd ..
            echo "Restarting web server..."
            pm2 restart web-server || pm2 start web-server.js --name web-server
            echo "Restarting sync server..."
            pm2 restart sync-server || pm2 start my-assistant/sync-server.js --name sync-server
            pm2 save
            echo "Deploy complete -- $(date)"
            pm2 status
