name: Deploy to dashboard-assistant.digify.ai

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          echo "Triggering deploy via HTTPS webhook..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            https://dashboard-assistant.digify.ai/deploy \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 45)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Deploy failed with status $HTTP_CODE"
            exit 1
          fi
          echo "Deploy successful!"
