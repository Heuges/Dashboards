<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboards — Loyal Companies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#0a0e1a; color:#f1f5f9; min-height:100vh;
               display:flex; align-items:center; justify-content:center; }
        .container { max-width:600px; width:100%; padding:40px 24px; text-align:center; }
        h1 { font-size:2rem; font-weight:800; margin-bottom:8px;
             background:linear-gradient(135deg,#fff,#94a3b8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        p { color:#64748b; font-size:.9rem; margin-bottom:40px; }
        .card { background:#1a2236; border:1px solid #1e293b; border-radius:16px; padding:24px;
                text-align:left; transition:all .3s; cursor:pointer; text-decoration:none; display:block; margin-bottom:16px; }
        .card:hover { background:#1f2a42; transform:translateY(-3px); box-shadow:0 8px 30px rgba(59,130,246,.15); }
        .card h2 { color:#f1f5f9; font-size:1.1rem; font-weight:700; margin-bottom:6px; }
        .card .desc { color:#94a3b8; font-size:.85rem; }
        .card .badge { display:inline-block; margin-top:10px; padding:3px 10px; border-radius:12px;
                       font-size:.7rem; font-weight:600; text-transform:uppercase; letter-spacing:.5px;
                       background:rgba(16,185,129,.15); color:#10b981; border:1px solid rgba(16,185,129,.3); }
        .footer { margin-top:40px; color:#334155; font-size:.75rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Dashboards</h1>
        <p>Financial dashboards for the Loyal Companies portfolio</p>
        <a href="./cem-breakeven-tracker/" class="card">
            <h2>CEM Breakeven Tracker</h2>
            <p class="desc">Weekly revenue vs. breakeven analysis for Channel Edge Media. Includes reduced & full strength targets with 3-week projections.</p>
            <span class="badge">Live</span>
        </a>
        <div class="footer">Loyal Companies · Updated May 2026</div>
    </div>
</body>
</html>
